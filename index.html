<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gameContainer">
        
        <div id="gameArea">
            <h1>Browser Snake</h1>
            
            <audio id="bgMusic" loop src="music.mp3"></audio>
            <div style="margin-bottom: 15px;">
                <button id="muteButton" style="padding: 5px 10px; background: #333; color: #fff; border: 1px solid #00ff80; border-radius: 4px; cursor: pointer;">
                    🔊 Muziek Aan/Uit
                </button>
            </div>

            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <p>Gebruik de **pijltjestoetsen** (↑, ↓, ←, →) om te bewegen.</p>
            <p>Score: <span id="score">0</span></p>
        </div>

        <div id="highscores">
            <h2>🏆 Highscores</h2>
            <ol id="scoresList">
                </ol>
        </div>
    </div>
    
    <div id="gameOverOverlay" class="hidden">
        <div id="gameOverContent">
            </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
